  # === from ptf_tools.yaml ===
  check_ptf_currency:
    source: ibmi-system
    description: "Check PTF group currency status for the current system release. Shows which PTF groups are current, outdated, or have updates available."
    statement: |
      WITH iLevel(iVersion, iRelease) AS (
        SELECT OS_VERSION, OS_RELEASE 
        FROM SYSIBMADM.ENV_SYS_INFO
      )
      SELECT P.PTF_GROUP_CURRENCY,
             P.PTF_GROUP_ID,
             P.PTF_GROUP_TITLE,
             P.PTF_GROUP_LEVEL_INSTALLED,
             P.PTF_GROUP_LEVEL_AVAILABLE,
             P.LAST_UPDATED_BY_IBM,
             P.PTF_GROUP_RELEASE,
             P.PTF_GROUP_STATUS_ON_SYSTEM,
             (P.PTF_GROUP_LEVEL_AVAILABLE - P.PTF_GROUP_LEVEL_INSTALLED) AS LEVELS_BEHIND
      FROM iLevel, SYSTOOLS.GROUP_PTF_CURRENCY P
      WHERE PTF_GROUP_RELEASE = 'R' CONCAT iVersion CONCAT iRelease CONCAT '0'
        AND (:currency_filter = '*ALL' OR P.PTF_GROUP_CURRENCY LIKE '%' CONCAT :currency_filter CONCAT '%')
      ORDER BY PTF_GROUP_LEVEL_AVAILABLE - PTF_GROUP_LEVEL_INSTALLED DESC
      FETCH FIRST 100 ROWS ONLY
    parameters:
      - name: currency_filter
        type: string
        description: "Filter by currency status (e.g., 'UPDATE AVAILABLE', 'CURRENT', '*ALL')"
        default: "*ALL"
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "system"
      category: "ptf-management"

  list_outdated_ptf_groups:
    source: ibmi-system
    description: "List only PTF groups that have updates available, showing how many levels behind each group is."
    statement: |
      WITH iLevel(iVersion, iRelease) AS (
        SELECT OS_VERSION, OS_RELEASE 
        FROM SYSIBMADM.ENV_SYS_INFO
      )
      SELECT P.PTF_GROUP_ID,
             P.PTF_GROUP_TITLE,
             P.PTF_GROUP_LEVEL_INSTALLED,
             P.PTF_GROUP_LEVEL_AVAILABLE,
             (P.PTF_GROUP_LEVEL_AVAILABLE - P.PTF_GROUP_LEVEL_INSTALLED) AS LEVELS_BEHIND,
             P.LAST_UPDATED_BY_IBM,
             P.PTF_GROUP_STATUS_ON_SYSTEM
      FROM iLevel, SYSTOOLS.GROUP_PTF_CURRENCY P
      WHERE PTF_GROUP_RELEASE = 'R' CONCAT iVersion CONCAT iRelease CONCAT '0'
        AND P.PTF_GROUP_CURRENCY = 'UPDATE AVAILABLE'
        AND (P.PTF_GROUP_LEVEL_AVAILABLE - P.PTF_GROUP_LEVEL_INSTALLED) >= :min_levels_behind
      ORDER BY PTF_GROUP_LEVEL_AVAILABLE - PTF_GROUP_LEVEL_INSTALLED DESC
      FETCH FIRST 50 ROWS ONLY
    parameters:
      - name: min_levels_behind
        type: integer
        description: "Minimum number of levels behind to include in results (1-100)"
        default: 1
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "system"
      category: "ptf-management"

  get_ptf_group_details:
    source: ibmi-system
    description: "Get detailed information about a specific PTF group, including all installed levels and their status."
    statement: |
      SELECT PTF_GROUP_NAME,
             PTF_GROUP_DESCRIPTION,
             PTF_GROUP_LEVEL,
             PTF_GROUP_TARGET_RELEASE,
             PTF_GROUP_STATUS,
             COLLECTED_TIME
      FROM QSYS2.GROUP_PTF_INFO
      WHERE PTF_GROUP_NAME LIKE :ptf_group_name CONCAT '%'
      ORDER BY PTF_GROUP_LEVEL DESC
      FETCH FIRST 20 ROWS ONLY
    parameters:
      - name: ptf_group_name
        type: string
        description: "PTF group name or prefix (e.g., 'SF99730', 'SF997'), 2-10 characters"
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "system"
      category: "ptf-management"

  list_installed_ptf_groups:
    source: ibmi-system
    description: "List all PTF groups currently installed on the system with optional filtering by status and release."
    statement: |
      SELECT PTF_GROUP_NAME,
             PTF_GROUP_DESCRIPTION,
             PTF_GROUP_LEVEL,
             PTF_GROUP_TARGET_RELEASE,
             PTF_GROUP_STATUS
      FROM QSYS2.GROUP_PTF_INFO
      WHERE (:status_filter = '*ALL' OR PTF_GROUP_STATUS = :status_filter)
        AND (:release_filter = '*ALL' OR PTF_GROUP_TARGET_RELEASE LIKE :release_filter CONCAT '%')
      ORDER BY PTF_GROUP_NAME, PTF_GROUP_LEVEL DESC
      FETCH FIRST 100 ROWS ONLY
    parameters:
      - name: status_filter
        type: string
        description: "Filter by status: 'INSTALLED', 'APPLY AT NEXT IPL', or '*ALL'"
        default: "*ALL"
      - name: release_filter
        type: string
        description: "Filter by release (e.g., 'R740', 'R750') or '*ALL'"
        default: "*ALL"
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "system"
      category: "ptf-management"

  summarize_ptf_status:
    source: ibmi-system
    description: "Get a high-level summary of PTF currency status including counts of current, outdated, and unavailable groups."
    statement: |
      WITH iLevel(iVersion, iRelease) AS (
        SELECT OS_VERSION, OS_RELEASE 
        FROM SYSIBMADM.ENV_SYS_INFO
      )
      SELECT 
        COUNT(*) AS TOTAL_PTF_GROUPS,
        SUM(CASE WHEN P.PTF_GROUP_CURRENCY LIKE '%CURRENT%' THEN 1 ELSE 0 END) AS CURRENT_GROUPS,
        SUM(CASE WHEN P.PTF_GROUP_CURRENCY = 'UPDATE AVAILABLE' THEN 1 ELSE 0 END) AS UPDATES_AVAILABLE,
        SUM(CASE WHEN P.PTF_GROUP_CURRENCY LIKE '%NOT AVAILABLE%' THEN 1 ELSE 0 END) AS INFO_NOT_AVAILABLE,
        AVG(P.PTF_GROUP_LEVEL_AVAILABLE - P.PTF_GROUP_LEVEL_INSTALLED) AS AVG_LEVELS_BEHIND,
        MAX(P.PTF_GROUP_LEVEL_AVAILABLE - P.PTF_GROUP_LEVEL_INSTALLED) AS MAX_LEVELS_BEHIND
      FROM iLevel, SYSTOOLS.GROUP_PTF_CURRENCY P
      WHERE PTF_GROUP_RELEASE = 'R' CONCAT iVersion CONCAT iRelease CONCAT '0'
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "system"
      category: "ptf-management"

  find_critical_ptf_updates:
    source: ibmi-system
    description: "Identify PTF groups that are significantly behind (critical updates needed), sorted by severity."
    statement: |
      WITH iLevel(iVersion, iRelease) AS (
        SELECT OS_VERSION, OS_RELEASE 
        FROM SYSIBMADM.ENV_SYS_INFO
      )
      SELECT P.PTF_GROUP_ID,
             P.PTF_GROUP_TITLE,
             P.PTF_GROUP_LEVEL_INSTALLED,
             P.PTF_GROUP_LEVEL_AVAILABLE,
             (P.PTF_GROUP_LEVEL_AVAILABLE - P.PTF_GROUP_LEVEL_INSTALLED) AS LEVELS_BEHIND,
             P.LAST_UPDATED_BY_IBM,
             P.PTF_GROUP_STATUS_ON_SYSTEM,
             P.PTF_GROUP_CURRENCY
      FROM iLevel, SYSTOOLS.GROUP_PTF_CURRENCY P
      WHERE PTF_GROUP_RELEASE = 'R' CONCAT iVersion CONCAT iRelease CONCAT '0'
        AND (P.PTF_GROUP_LEVEL_AVAILABLE - P.PTF_GROUP_LEVEL_INSTALLED) >= :critical_threshold
      ORDER BY (P.PTF_GROUP_LEVEL_AVAILABLE - P.PTF_GROUP_LEVEL_INSTALLED) DESC
      FETCH FIRST 25 ROWS ONLY
    parameters:
      - name: critical_threshold
        type: integer
        description: "Number of levels behind to consider critical (1-100, default: 5)"
        default: 5
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "system"
      category: "ptf-management"

  # === from security-ops.yaml ===
  users_with_limited_capabilities:
    source: ibmi-system
    description: "Identify which users are configured with limited capabilities"
    statement: |
      SELECT *
        FROM qsys2.user_info_basic
        WHERE limit_capabilities = '*YES'
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "security"
      category: "user-management"

  commands_allowed_for_users_with_limited_capabilities:
    source: ibmi-system
    description: "Identify which commands on the IBM i can be executed by the `users` with limited capabilities"
    parameters: []
    statement: |
      SELECT *
        FROM qsys2.command_info
        WHERE allow_limited_user = 'YES'
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "security"
      category: "user-management"

  repopulate_special_authority_detail:
    source: ibmi-system
    description: "Repopulate the special authority detail in the SYSTOOLS MQT"
    statement: |
      REFRESH TABLE systools.special_authority_data_mart
    security:
      readOnly: false
    annotations:
      readOnlyHint: false
      idempotentHint: true
      domain: "security"
      category: "audit"

  list_users_who_can_see_all_db2_data:
    source: ibmi-system
    description: "Identify which users have *ALLOBJ or *SAVSYS special authorities, can see any Db2 for i data"
    statement: |
      SELECT *
        FROM systools.special_authority_data_mart
        WHERE special_authority IN ('*ALLOBJ', '*SAVSYS')
        ORDER BY user_name
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "security"
      category: "vulnerability-assessment"

  list_db_files_readable_by_any_user:
    source: ibmi-system
    description: "List database files that any user can read"
    statement: |
      WITH libs (lib_name) AS (
        SELECT object_name
          FROM qsys2.object_privileges
          WHERE system_object_schema = 'QSYS'
            AND object_type = '*LIB'
            AND user_name = '*PUBLIC'
            AND data_execute = 'YES'
      )
      SELECT *
        FROM libs, qsys2.object_privileges
        WHERE system_object_schema = lib_name
          AND object_type = '*FILE'
          AND user_name = '*PUBLIC'
          AND data_read = 'YES'
          AND object_operational = 'YES'
          AND ('PF' = (SELECT objattribute
                         FROM TABLE (qsys2.object_statistics(lib_name, '*FILE', object_name))))
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "security"
      category: "vulnerability-assessment"

  list_db_files_writable_by_any_user:
    source: ibmi-system
    description: "List files where any user can insert rows"
    statement: |
      WITH libs (lib_name) AS (
        SELECT object_name
          FROM qsys2.object_privileges
          WHERE system_object_schema = 'QSYS'
            AND object_type = '*LIB'
            AND user_name = '*PUBLIC'
            AND data_execute = 'YES'
      )
      SELECT *
        FROM libs, qsys2.object_privileges
        WHERE system_object_schema = lib_name
          AND object_type = '*FILE'
          AND user_name = '*PUBLIC'
          AND data_add = 'YES'
          AND ('PF' = (SELECT objattribute
                         FROM TABLE (qsys2.object_statistics(lib_name, '*FILE', object_name))))
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "security"
      category: "vulnerability-assessment"

  list_db_files_deletable_by_any_user:
    source: ibmi-system
    description: "List all files where any user can delete rows"
    statement: |
      WITH libs (lib_name) AS (
        SELECT object_name
          FROM qsys2.object_privileges
          WHERE system_object_schema = 'QSYS'
            AND object_type = '*LIB'
            AND user_name = '*PUBLIC'
            AND data_execute = 'YES'
      )
      SELECT *
        FROM libs, qsys2.object_privileges
        WHERE system_object_schema = lib_name
          AND object_type = '*FILE'
          AND user_name = '*PUBLIC'
          AND data_delete = 'YES'
          AND ('PF' = (SELECT objattribute
                         FROM TABLE (qsys2.object_statistics(lib_name, '*FILE', object_name))))
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "security"
      category: "vulnerability-assessment"

  list_db_files_updatable_by_any_user:
    source: ibmi-system
    description: "List all files where any user can update rows"
    statement: |
      WITH libs (lib_name) AS (
        SELECT object_name
          FROM qsys2.object_privileges
          WHERE system_object_schema = 'QSYS'
            AND object_type = '*LIB'
            AND user_name = '*PUBLIC'
            AND data_execute = 'YES'
      )
      SELECT *
        FROM libs, qsys2.object_privileges
        WHERE system_object_schema = lib_name
          AND object_type = '*FILE'
          AND user_name = '*PUBLIC'
          AND data_update = 'YES'
          AND ('PF' = (SELECT objattribute
                         FROM TABLE (qsys2.object_statistics(lib_name, '*FILE', object_name))))
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "security"
      category: "vulnerability-assessment"

  list_db_files_exposed_to_trigger_attack:
    source: ibmi-system
    description: "List files exposed to a trigger attack where any user can read and alter or manage the file"
    statement: |
      WITH libs (lib_name) AS (
        SELECT object_name
          FROM qsys2.object_privileges
          WHERE system_object_schema = 'QSYS'
            AND object_type = '*LIB'
            AND user_name = '*PUBLIC'
            AND data_execute = 'YES'
      )
      SELECT *
        FROM libs, qsys2.object_privileges
        WHERE system_object_schema = lib_name
          AND object_type = '*FILE'
          AND user_name = '*PUBLIC'
          AND data_read = 'YES'
          AND object_operational = 'YES'
          AND (object_alter = 'YES' OR object_management = 'YES')
          AND ('PF' = (SELECT objattribute
                         FROM TABLE (qsys2.object_statistics(lib_name, '*FILE', object_name))))
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "security"
      category: "vulnerability-assessment"

  list_user_profiles_vulnerable_to_impersonation:
    source: ibmi-system
    description: "Identify user profiles vulnerable to impersonation attack where *PUBLIC authority is not set to *EXCLUDE"
    statement: |
      SELECT object_name AS user_name, object_authority, owner
        FROM qsys2.object_privileges
        WHERE system_object_schema = 'QSYS'
          AND object_type = '*USRPRF'
          AND object_name NOT IN ('QDBSHR', 'QDBSHRDO', 'QDOC', 'QTMPLPD')
          AND user_name = '*PUBLIC'
          AND object_authority <> '*EXCLUDE'
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "security"
      category: "vulnerability-assessment"

  list_public_authority_on_attack_vector_commands:
    source: ibmi-system
    description: "Identify dangerous commands that *PUBLIC users can execute, enabling potential privilege escalation or data exfiltration"
    statement: |
      SELECT object_name, object_type, object_authority
        FROM qsys2.object_privileges
        WHERE system_object_schema = 'QSYS'
          AND object_type = '*CMD'
          AND object_name IN ('ADDPFTRG', 'CRTPGM', 'CRTSRVPGM', 'SAVOBJ', 'SAVLIB', 'CRTDUPOBJ', 'CPYF')
          AND user_name = '*PUBLIC'
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "security"
      category: "vulnerability-assessment"

  check_command_audit_settings:
    source: ibmi-system
    description: "Check object audit settings for specified IBM i commands in QSYS library to verify if security logging is enabled"
    parameters:
      - name: command_names
        type: array
        description: "Array of command names to check audit settings for (e.g., ['ADDPFTRG', 'CRTPGM', 'SAVOBJ']). Common attack vector commands include ADDPFTRG, CRTPGM, CRTSRVPGM, SAVOBJ, SAVLIB, CRTDUPOBJ, CPYF"
        required: true
    statement: |
      SELECT objname, object_audit
        FROM TABLE (qsys2.object_statistics('QSYS', '*CMD'))
        WHERE objname IN (:command_names)
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "security"
      category: "audit"

  generate_impersonation_lockdown_commands:
    source: ibmi-system
    description: "Generate GRTOBJAUT commands to lock down user profiles vulnerable to impersonation by setting *PUBLIC authority to *EXCLUDE. Returns CL commands as strings without executing them"
    statement: |
      SELECT 'QSYS/GRTOBJAUT OBJ(' CONCAT object_name CONCAT ') OBJTYPE(*USRPRF) USER(*PUBLIC) AUT(*EXCLUDE)' AS lockdown_commands
        FROM qsys2.object_privileges
        WHERE system_object_schema = 'QSYS'
          AND object_type = '*USRPRF'
          AND user_name = '*PUBLIC'
          AND object_name NOT IN ('QDBSHR', 'QDBSHRDO', 'QDOC', 'QTMPLPD')
          AND object_authority <> '*EXCLUDE'
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "security"
      category: "remediation"

  execute_impersonation_lockdown:
    source: ibmi-system
    description: "WRITE OPERATION: Execute GRTOBJAUT commands to lock down user profiles vulnerable to impersonation by setting *PUBLIC authority to *EXCLUDE. This modifies system security settings. Use with caution"
    statement: |
      SELECT qsys2.qcmdexc('QSYS/GRTOBJAUT OBJ(' CONCAT object_name CONCAT ') OBJTYPE(*USRPRF) USER(*PUBLIC) AUT(*EXCLUDE)') AS lockdown_result
        FROM qsys2.object_privileges
        WHERE system_object_schema = 'QSYS'
          AND object_type = '*USRPRF'
          AND user_name = '*PUBLIC'
          AND object_name NOT IN ('QDBSHR', 'QDBSHRDO', 'QDOC', 'QTMPLPD')
          AND object_authority <> '*EXCLUDE'
    security:
      readOnly: false
    annotations:
      readOnlyHint: false
      idempotentHint: false
      destructiveHint: true
      openWorldHint: true
      domain: "security"
      category: "remediation"

  list_files_exposed_to_rename_attack:
    source: ibmi-system
    description: "Identify database files vulnerable to rename attacks where *PUBLIC has DATA_EXECUTE & DATA_UPDATE on library plus OBJECT_MANAGEMENT & OBJECT_OPERATIONAL on file"
    statement: |
      WITH libs (lib_name) AS (
        SELECT object_name
          FROM qsys2.object_privileges
          WHERE system_object_schema = 'QSYS'
            AND object_type = '*LIB'
            AND authorization_name = '*PUBLIC'
            AND data_execute = 'YES'
            AND data_update = 'YES'
      )
      SELECT priv.*
        FROM libs, LATERAL (
               SELECT *
                 FROM qsys2.object_privileges
                 WHERE system_object_schema = lib_name
                   AND object_type = '*FILE'
                   AND authorization_name = '*PUBLIC'
                   AND object_management = 'YES'
                   AND object_operational = 'YES'
                   AND ('PF' = (SELECT objattribute
                                  FROM TABLE (qsys2.object_statistics(lib_name, '*FILE', object_name))))
             ) priv
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "security"
      category: "vulnerability-assessment"


  list_system_libraries_allowing_table_creation:
    source: ibmi-system
    description: "Identify libraries in system or product portion of library list where *PUBLIC can create tables, exposing system to library list attacks"
    statement: |
      SELECT lib.*, priv.*
        FROM qsys2.library_list_info lib, LATERAL (
               SELECT *
                 FROM qsys2.object_privileges
                 WHERE system_object_schema = 'QSYS'
                   AND system_object_name = lib.system_schema_name
                   AND object_type = '*LIB'
             ) priv
        WHERE lib.type NOT IN ('USER')
          AND authorization_name = '*PUBLIC'
          AND object_operational = 'YES'
          AND data_read = 'YES'
          AND data_add = 'YES'
          AND data_execute = 'YES'
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "security"
      category: "vulnerability-assessment"

  list_adopted_authority_programs_with_public_access:
    source: ibmi-system
    description: "Identify programs using adopted authority (USRPRF=*OWNER) that are not secured with *PUBLIC *EXCLUDE or *AUTL, enabling privilege escalation attacks"
    statement: |
      WITH adopt_pgms(lib_name, pgm_name, obj_type) AS (
        SELECT program_library, program_name, object_type
          FROM qsys2.program_info
          WHERE program_library NOT LIKE 'Q%'
            AND program_library NOT LIKE 'SYS%'
            AND user_profile = '*OWNER'
      )
      SELECT lib_name, pgm_name, obj_type, object_authority AS public_authority
        FROM adopt_pgms, LATERAL (
               SELECT *
                 FROM TABLE (qsys2.object_privileges(
                        system_object_schema => lib_name,
                        system_object_name => pgm_name,
                        object_type => obj_type))
             )
        WHERE authorization_user = '*PUBLIC'
          AND object_authority NOT IN ('*EXCLUDE', '*AUTL')
        ORDER BY lib_name, pgm_name, obj_type
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "security"
      category: "vulnerability-assessment"

  # === from sys-admin.yaml ===
  describe_object:
    enabled: false
    source: ibmi-system
    description: Describe an SQL object by generating DDL definition
    statement: |-
      CALL QSYS2.GENERATE_SQL(
          DATABASE_OBJECT_NAME => :name,
          DATABASE_OBJECT_LIBRARY_NAME => :library,
          DATABASE_OBJECT_TYPE => :type,
          CREATE_OR_REPLACE_OPTION => '1',
          PRIVILEGES_OPTION => '0',
          STATEMENT_FORMATTING_OPTION => '0',
          SOURCE_STREAM_FILE_END_OF_LINE => 'LF',
          SOURCE_STREAM_FILE_CCSID => 1208
      )
    parameters:
      - name: name
        type: string
        description: The name of the object
        required: true
      - name: library
        type: string
        description: The name of the library where the object is defined
        required: true
        default: QSYS2
      - name: type
        type: string
        default: TABLE
        description: |-
          A character or graphic string expression that identifies the type of the database object or object attribute for which DDL is generated. 
          You can use these special values for the object type:
          ALIAS
              The object is an SQL alias.
          CONSTRAINT
              The object attribute is a constraint.
          FUNCTION
              The object is an SQL function.
          INDEX
              The object is an SQL index.
          MASK
              The object is an SQL column mask.
          PERMISSION
              The object is an SQL row permission.
          PROCEDURE
              The object is an SQL procedure.
          SCHEMA
              The object is an SQL schema.
          SEQUENCE
              The object is an SQL sequence.
          TABLE
              The object is an SQL table or physical file.
          TRIGGER
              The object attribute is a trigger.
          TYPE
              The object is an SQL type.
          VARIABLE
              The object is an SQL global variable.
          VIEW
              The object is an SQL view or logical file.
          XSR
              The object is an XML schema repository object.

    domain: sysadmin
  list_service_categories:
    source: ibmi-system
    description: List all service categories with counts of services in each.
    statement: |-
      SELECT service_category,
             COUNT(*) AS service_count
      FROM qsys2.services_info
      GROUP BY service_category
      ORDER BY service_count DESC, service_category
    domain: sysadmin
    category: discovery
    metadata:
      title: Service categories and counts

  list_services_by_category:
    source: ibmi-system
    description: Browse services for a specific category with key details.
    statement: |-
      SELECT service_schema_name,
             service_name,
             sql_object_type,
             object_type,
             system_object_name,
             earliest_possible_release,
             latest_db2_group_level,
             initial_db2_group_level
      FROM qsys2.services_info
      WHERE service_category = :category
      ORDER BY service_schema_name, service_name
    parameters:
      - name: category
        type: string
        description: Exact value of SERVICE_CATEGORY to filter by.
        required: true
    domain: sysadmin
    category: browse
    metadata:
      title: Services by category

  search_services_by_name:
    source: ibmi-system
    description: Case-insensitive search of services by name (contains match).
    statement: |-
      SELECT service_category,
             service_schema_name,
             service_name,
             sql_object_type,
             earliest_possible_release
      FROM qsys2.services_info
      WHERE UPPER(service_name) LIKE UPPER('%' CONCAT :name_contains CONCAT '%')
      ORDER BY service_category, service_schema_name, service_name
    parameters:
      - name: name_contains
        type: string
        description: Substring to search for in SERVICE_NAME.
        required: true
        minLength: 2
    domain: sysadmin
    category: search
    metadata:
      title: Search services by name

  list_services_by_schema:
    source: ibmi-system
    description: List services provided by a specific schema (e.g., QSYS2, SYSTOOLS).
    statement: |-
      SELECT service_category,
             service_name,
             sql_object_type,
             earliest_possible_release
      FROM qsys2.services_info
      WHERE service_schema_name = UPPER(:schema_name)
      ORDER BY service_category, service_name
    parameters:
      - name: schema_name
        type: string
        description: Schema name (library), e.g., QSYS2 or SYSTOOLS.
        required: true
        minLength: 1
    domain: sysadmin
    category: browse
    metadata:
      title: Services by schema

  list_services_by_sql_object_type:
    source: ibmi-system
    description: List services by SQL object type (VIEW, PROCEDURE, SCALAR FUNCTION, etc.).
    statement: |-
      SELECT service_category,
             service_schema_name,
             service_name,
             sql_object_type,
             earliest_possible_release
      FROM qsys2.services_info
      WHERE sql_object_type = :sql_object_type
      ORDER BY service_category, service_schema_name, service_name
    parameters:
      - name: sql_object_type
        type: string
        description: SQL object type to filter by.
        required: true
        enum: ["VIEW", "PROCEDURE", "SCALAR FUNCTION", "TABLE FUNCTION", "TABLE"]
    domain: sysadmin
    category: browse
    metadata:
      title: Services by SQL object type

  get_service_example:
    source: ibmi-system
    description: Retrieve the example SQL/usage snippet for a specific service.
    statement: |-
      SELECT service_schema_name,
             service_name,
             example
      FROM qsys2.services_info
      WHERE service_schema_name = UPPER(:schema_name)
        AND service_name = UPPER(:service_name)
    parameters:
      - name: schema_name
        type: string
        description: Schema name containing the service (e.g., QSYS2).
        required: true
      - name: service_name
        type: string
        description: Exact SERVICE_NAME (case-insensitive match used).
        required: true
    domain: sysadmin
    category: reference
    metadata:
      title: Get service example

  where_is_service:
    source: ibmi-system
    description: Locate a service by name and return its schema and object metadata.
    statement: |-
      SELECT service_category,
             service_schema_name,
             service_name,
             sql_object_type,
             object_type,
             system_object_name,
             earliest_possible_release
      FROM qsys2.services_info
      WHERE UPPER(service_name) = UPPER(:service_name)
      ORDER BY service_schema_name
    parameters:
      - name: service_name
        type: string
        description: Exact SERVICE_NAME to locate.
        required: true
    domain: sysadmin
    category: search
    metadata:
      title: Where is this service?

  search_examples_for_keyword:
    source: ibmi-system
    description: Search the EXAMPLE text for a keyword or phrase (case-insensitive).
    statement: |-
      SELECT service_category,
             service_schema_name,
             service_name,
             SUBSTR(example, 1, 300) AS example_snippet
      FROM qsys2.services_info
      WHERE example IS NOT NULL
        AND UPPER(example) LIKE UPPER('%' CONCAT :keyword CONCAT '%')
      ORDER BY service_category, service_schema_name, service_name
    parameters:
      - name: keyword
        type: string
        description: Keyword or phrase to search for within EXAMPLE text.
        required: true
        minLength: 2
    domain: sysadmin
    category: search
    metadata:
      title: Search examples for keyword

  count_services_by_schema:
    source: ibmi-system
    description: Count services by providing schema.
    statement: |-
      SELECT service_schema_name,
             COUNT(*) AS service_count
      FROM qsys2.services_info
      GROUP BY service_schema_name
      ORDER BY service_count DESC, service_schema_name
    domain: sysadmin
    category: discovery
    metadata:
      title: Service counts by schema

  count_services_by_sql_object_type:
    source: ibmi-system
    description: Summarize services by SQL object type.
    statement: |-
      SELECT sql_object_type,
             COUNT(*) AS service_count
      FROM qsys2.services_info
      GROUP BY sql_object_type
      ORDER BY service_count DESC, sql_object_type
    domain: sysadmin
    category: discovery
    metadata:
      title: Service counts by SQL object type

  list_categories_for_schema:
    source: ibmi-system
    description: Show which categories exist within a given schema.
    statement: |-
      SELECT service_schema_name,
             service_category,
             COUNT(*) AS service_count
      FROM qsys2.services_info
      WHERE service_schema_name = UPPER(:schema_name)
      GROUP BY service_schema_name, service_category
      ORDER BY service_count DESC, service_category
    parameters:
      - name: schema_name
        type: string
        description: Schema name to summarize (e.g., QSYS2).
        required: true
    domain: sysadmin
    category: discovery
    metadata:
      title: Categories within a schema

  # === from text2sql.yaml ===
  list_tables_in_schema:
    source: ibmi-system
    description: "List tables, views, and physical files in a specific schema with metadata including row counts. Essential for understanding schema structure."
    statement: |
      SELECT T.TABLE_SCHEMA,
             T.TABLE_NAME,
             T.TABLE_TYPE,
             T.TABLE_TEXT,
             COALESCE(S.NUMBER_ROWS, 0) AS NUMBER_ROWS,
             T.COLUMN_COUNT
      FROM QSYS2.SYSTABLES T
      LEFT JOIN QSYS2.SYSTABLESTAT S
        ON T.TABLE_SCHEMA = S.TABLE_SCHEMA
        AND T.TABLE_NAME = S.TABLE_NAME
      WHERE T.TABLE_SCHEMA = UPPER(:schema_name)
        AND T.TABLE_TYPE IN ('T', 'V', 'P')
        AND (:table_filter = '*ALL' OR T.TABLE_NAME LIKE UPPER(:table_filter))
      ORDER BY T.TABLE_TYPE, T.TABLE_NAME
      FETCH FIRST 200 ROWS ONLY
    parameters:
      - name: schema_name
        type: string
        description: "Schema name to list tables from (e.g., 'QIWS', 'SAMPLE', 'MYLIB')"
        required: true
      - name: table_filter
        type: string
        description: "Filter tables by name pattern (e.g., 'CUST%', 'ORD%'). Use '*ALL' for all tables."
        default: "*ALL"
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "development"
      category: "text2sql"

  # Query Validation
  validate_query:
    source: ibmi-system
    description: "Validate SQL query syntax using IBM i's native SQL parser. Returns statement type and parsing results without executing the query. If no results are returned, the statement is invalid"
    statement: |
      SELECT *
      FROM TABLE(QSYS2.PARSE_STATEMENT(
        SQL_STATEMENT => :sql_statement,
        NAMING => '*SQL',
        DECIMAL_POINT => '*PERIOD',
        SQL_STRING_DELIMITER => '*APOSTSQL'
      )) AS P
    parameters:
      - name: sql_statement
        type: string
        description: "SQL statement to validate (e.g., 'SELECT * FROM QIWS.QCUSTCDT')"
        required: true
        minLength: 5
        maxLength: 10000
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "development"
      category: "text2sql"

  # Data Sampling
  sample_rows:
    source: ibmi-system
    description: "Generate a sample query for a table. Returns the SQL statement to use with execute_sql to fetch sample data. YAML tools cannot dynamically query arbitrary tables, so use this to generate the query then execute it separately."
    statement: |
      SELECT
        'SELECT * FROM ' || TRIM(T.TABLE_SCHEMA) || '.' || TRIM(T.TABLE_NAME) ||
        ' FETCH FIRST ' || CAST(:sample_size AS VARCHAR(10)) || ' ROWS ONLY' AS SAMPLE_QUERY,
        T.TABLE_SCHEMA,
        T.TABLE_NAME,
        COALESCE(S.NUMBER_ROWS, 0) AS TOTAL_ROWS
      FROM QSYS2.SYSTABLES T
      LEFT JOIN QSYS2.SYSTABLESTAT S
        ON T.TABLE_SCHEMA = S.TABLE_SCHEMA
        AND T.TABLE_NAME = S.TABLE_NAME
      WHERE T.TABLE_SCHEMA = UPPER(:schema_name)
        AND T.TABLE_NAME = UPPER(:table_name)
        AND T.TABLE_TYPE IN ('T', 'V', 'P')
      FETCH FIRST 1 ROWS ONLY
    parameters:
      - name: schema_name
        type: string
        description: "Schema name containing the table (e.g., 'QIWS', 'SAMPLE')"
        required: true
      - name: table_name
        type: string
        description: "Table name to sample (e.g., 'QCUSTCDT', 'EMPLOYEE')"
        required: true
      - name: sample_size
        type: integer
        description: "Number of rows to include in sample query (1-100)"
        default: 10
        min: 1
        max: 100
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "development"
      category: "text2sql"

  # Enhanced Table Statistics
  get_table_statistics:
    source: ibmi-system
    description: "Get comprehensive statistics for a table including row count, physical size, last used timestamp, and I/O metrics. Combines data from SYSTABLES, SYSTABLESTAT, and OBJECT_STATISTICS."
    statement: |
      SELECT
        T.TABLE_SCHEMA,
        T.TABLE_NAME,
        COALESCE(S.NUMBER_ROWS, 0) AS NUMBER_ROWS,
        COALESCE(O.OBJSIZE, 0) AS SIZE_BYTES,
        COALESCE(O.OBJSIZE / 1024, 0) AS SIZE_KB,
        O.LAST_USED_TIMESTAMP,
        O.DAYS_USED_COUNT,
        COALESCE(S.NUMBER_DELETED_ROWS, 0) AS DELETED_ROWS,
        S.LAST_CHANGE_TIMESTAMP,
        T.LAST_ALTERED_TIMESTAMP
      FROM QSYS2.SYSTABLES T
      LEFT JOIN QSYS2.SYSTABLESTAT S
        ON T.TABLE_SCHEMA = S.TABLE_SCHEMA
        AND T.TABLE_NAME = S.TABLE_NAME
      LEFT JOIN TABLE(QSYS2.OBJECT_STATISTICS(
        OBJECT_SCHEMA => UPPER(:schema_name),
        OBJTYPELIST => '*FILE',
        OBJECT_NAME => UPPER(:table_name)
      )) O
        ON T.TABLE_NAME = O.OBJNAME
      WHERE T.TABLE_SCHEMA = UPPER(:schema_name)
        AND T.TABLE_NAME = UPPER(:table_name)
      FETCH FIRST 1 ROWS ONLY
    parameters:
      - name: schema_name
        type: string
        description: "Schema name containing the table"
        required: true
      - name: table_name
        type: string
        description: "Table name to get statistics for"
        required: true
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "development"
      category: "text2sql"

