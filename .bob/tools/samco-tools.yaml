sources:
  ibmi-system:
    host: ${DB2i_HOST}
    user: ${DB2i_USER}
    password: ${DB2i_PASS}
    port: 54999
    ignore-unauthorized: true

tools:  # === from employee-info.yaml ===
  get_employee_details:
    source: ibmi-system
    description: Retrieve detailed information about an employee including department and manager
    statement: |
      SELECT 
        E.EMPNO, 
        E.FIRSTNME, 
        E.MIDINIT, 
        E.LASTNAME, 
        E.JOB, 
        E.HIREDATE, 
        E.SALARY, 
        E.BONUS, 
        E.WORKDEPT,
        D.DEPTNAME,
        D.LOCATION,
        M.FIRSTNME AS MGR_FIRSTNME,
        M.LASTNAME AS MGR_LASTNAME
      FROM SAMPLE.EMPLOYEE E
      LEFT JOIN SAMPLE.DEPARTMENT D ON E.WORKDEPT = D.DEPTNO
      LEFT JOIN SAMPLE.EMPLOYEE M ON D.MGRNO = M.EMPNO
      WHERE E.EMPNO = :employee_id
    parameters:
      - name: employee_id
        type: string
        description: "Employee ID (e.g., '000010') - Must be 6 digits"
        required: true
        pattern: "^[0-9]{6}$"
    responseFormat: markdown
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "hr"
      category: "employee-info"
      title: "Get Employee Details"

  find_employees_by_department:
    source: ibmi-system
    description: List employees in a specific department
    statement: |
      SELECT 
        E.EMPNO, 
        E.FIRSTNME, 
        E.MIDINIT, 
        E.LASTNAME, 
        E.JOB, 
        E.HIREDATE, 
        E.SALARY
      FROM SAMPLE.EMPLOYEE E
      WHERE E.WORKDEPT = :department_id
      ORDER BY E.LASTNAME, E.FIRSTNME
    parameters:
      - name: department_id
        type: string
        description: "Department ID - Select from predefined departments"
        required: true
        enum: ["A00", "B01", "C01", "D01", "E01"]
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "hr"
      category: "employee-info"
      title: "Find Employees by Department"

  find_employees_by_job:
    source: ibmi-system
    description: Find employees with a specific job title
    statement: |
      SELECT 
        E.EMPNO, 
        E.FIRSTNME, 
        E.MIDINIT, 
        E.LASTNAME, 
        E.WORKDEPT,
        D.DEPTNAME,
        E.HIREDATE, 
        E.SALARY
      FROM SAMPLE.EMPLOYEE E
      LEFT JOIN SAMPLE.DEPARTMENT D ON E.WORKDEPT = D.DEPTNO
      WHERE E.JOB = :job_title
      ORDER BY E.LASTNAME, E.FIRSTNME
    parameters:
      - name: job_title
        type: string
        description: "Job title - Select from common job titles"
        required: true
        enum: ["MANAGER", "ANALYST", "DESIGNER", "CLERK", "SALESREP", "PRES"]
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "hr"
      category: "employee-info"
      title: "Find Employees by Job Title"

  get_employee_projects:
    source: ibmi-system
    description: List projects an employee is working on
    statement: |
      SELECT 
        P.PROJNO,
        P.PROJNAME,
        A.ACTNO,
        A.ACTDESC,
        EPA.EMSTDATE AS START_DATE,
        EPA.EMENDATE AS END_DATE,
        EPA.EMPTIME
      FROM SAMPLE.EMPPROJACT EPA
      JOIN SAMPLE.PROJECT P ON EPA.PROJNO = P.PROJNO
      JOIN SAMPLE.PROJACT PA ON EPA.PROJNO = PA.PROJNO AND EPA.ACTNO = PA.ACTNO
      JOIN SAMPLE.ACT A ON EPA.ACTNO = A.ACTNO
      WHERE EPA.EMPNO = :employee_id
      AND (:include_completed = 1 OR EPA.EMENDATE IS NULL)
      ORDER BY EPA.EMSTDATE DESC
    parameters:
      - name: employee_id
        type: string
        description: "Employee ID (e.g., '000010') - Must be 6 digits"
        required: true
        pattern: "^[0-9]{6}$"
      - name: include_completed
        type: boolean
        description: "Include completed projects (true) or only active projects (false)"
        default: true
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "hr"
      category: "project-assignments"
      title: "Get Employee Projects"

  get_department_salary_stats:
    source: ibmi-system
    description: Salary statistics by department with optional salary range filter
    statement: |
      SELECT 
        D.DEPTNO,
        D.DEPTNAME,
        COUNT(E.EMPNO) AS EMPLOYEE_COUNT,
        AVG(E.SALARY) AS AVG_SALARY,
        MIN(E.SALARY) AS MIN_SALARY,
        MAX(E.SALARY) AS MAX_SALARY,
        SUM(E.SALARY) AS TOTAL_SALARY
      FROM SAMPLE.DEPARTMENT D
      LEFT JOIN SAMPLE.EMPLOYEE E ON D.DEPTNO = E.WORKDEPT
      WHERE (D.DEPTNO = :department_id OR :department_id = '*ALL')
      AND (E.SALARY >= :min_salary OR :min_salary IS NULL)
      AND (E.SALARY <= :max_salary OR :max_salary IS NULL)
      GROUP BY D.DEPTNO, D.DEPTNAME
      ORDER BY D.DEPTNO
    parameters:
      - name: department_id
        type: string
        description: "Department ID (e.g., 'A00') or '*ALL' for all departments"
        default: "*ALL"
      - name: min_salary
        type: integer
        description: "Minimum salary filter (optional)"
        min: 0
        max: 100000
        default: 0
      - name: max_salary
        type: integer
        description: "Maximum salary filter (optional)"
        min: 0
        max: 100000
        default: 100000
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "hr"
      category: "salary-analysis"
      title: "Department Salary Statistics"

  find_project_team_members:
    enabled: true
    source: ibmi-system
    description: Find all employees working on specific projects. Accepts a JSON array of project IDs.
    statement: |
      SELECT
        E.EMPNO,
        E.FIRSTNME,
        E.MIDINIT,
        E.LASTNAME,
        E.JOB,
        E.WORKDEPT,
        D.DEPTNAME,
        EPA.PROJNO,
        EPA.EMSTDATE AS PROJECT_START_DATE,
        EPA.EMENDATE AS PROJECT_END_DATE,
        EPA.EMPTIME AS TIME_ALLOCATION
      FROM SAMPLE.EMPPROJACT EPA
      JOIN SAMPLE.EMPLOYEE E ON EPA.EMPNO = E.EMPNO
      LEFT JOIN SAMPLE.DEPARTMENT D ON E.WORKDEPT = D.DEPTNO
      WHERE EPA.PROJNO IN (:project_ids)
      ORDER BY EPA.PROJNO, E.LASTNAME, E.FIRSTNME
    parameters:
      - name: project_ids
        type: array
        itemType: string
        description: "Array of project IDs to search for. Must be a JSON array, not a string. Example: [\"MA2100\", \"AD3100\", \"AD3110\"]"
        required: true
        minLength: 1
        maxLength: 10
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "hr"
      category: "project-assignments"
      title: "Find Project Team Members"

  calculate_employee_bonus:
    source: ibmi-system
    description: Calculate potential bonus for an employee based on performance rating and salary
    statement: |
      SELECT 
        E.EMPNO, 
        E.FIRSTNME, 
        E.LASTNAME, 
        E.SALARY,
        E.SALARY * :performance_multiplier AS CALCULATED_BONUS
      FROM SAMPLE.EMPLOYEE E
      WHERE E.EMPNO = :employee_id
    parameters:
      - name: employee_id
        type: string
        description: "Employee ID (e.g., '000010')"
        required: true
        pattern: "^[0-9]{6}$"
      - name: performance_multiplier
        type: float
        description: "Performance rating multiplier (0.0-0.3)"
        required: true
        min: 0.0
        max: 0.3
        default: 0.1
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "hr"
      category: "salary-analysis"
      title: "Calculate Employee Bonus"

  search_employees:
    source: ibmi-system
    description: Search for employees by name with pagination
    statement: |
      SELECT 
        E.EMPNO, 
        E.FIRSTNME, 
        E.MIDINIT, 
        E.LASTNAME, 
        E.JOB, 
        E.WORKDEPT,
        D.DEPTNAME
      FROM SAMPLE.EMPLOYEE E
      LEFT JOIN SAMPLE.DEPARTMENT D ON E.WORKDEPT = D.DEPTNO
      WHERE UPPER(E.FIRSTNME) LIKE UPPER('%' || :name_search || '%')
      OR UPPER(E.LASTNAME) LIKE UPPER('%' || :name_search || '%')
      ORDER BY E.LASTNAME, E.FIRSTNME
      LIMIT :page_size OFFSET (:page_number - 1) * :page_size
    parameters:
      - name: name_search
        type: string
        description: "Name to search for (partial match)"
        required: true
        minLength: 2
      - name: page_size
        type: integer
        description: "Number of results per page"
        default: 10
        min: 1
        max: 100
      - name: page_number
        type: integer
        description: "Page number (starting from 1)"
        default: 1
        min: 1
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "hr"
      category: "employee-info"
      title: "Search Employees"

  # === from library-list-security.yaml ===
  get_system_library_list_config:
    source: ibmi-system
    description: "Retrieve the system portion of the library list configuration from system values"
    statement: |
      SELECT system_value
        FROM qsys2.system_value_info
        WHERE system_value_name = 'QSYSLIBL'
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "security"
      category: "library-list"

  get_system_library_list_details:
    source: ibmi-system
    description: "Get detailed information about the system portion of the library list"
    statement: |
      SELECT *
        FROM qsys2.library_list_info
        WHERE "TYPE" = 'SYSTEM'
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "security"
      category: "library-list"

  check_chgsyslibl_security:
    source: ibmi-system
    description: "Check if the Change System Library List command is properly secured (should be *EXCLUDE for *PUBLIC)"
    statement: |
      SELECT object_authority
        FROM qsys2.object_privileges
        WHERE system_object_schema = 'QSYS' 
          AND system_object_name = 'CHGSYSLIBL' 
          AND object_type = '*CMD'
          AND authorization_name = '*PUBLIC'
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "security"
      category: "library-list"

  get_user_library_list_config:
    source: ibmi-system
    description: "Retrieve the user portion of the library list configuration from system values"
    statement: |
      SELECT system_value
        FROM qsys2.system_value_info
        WHERE system_value_name = 'QUSRLIBL'
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "security"
      category: "library-list"

  get_complete_library_list:
    source: ibmi-system
    description: "Get detailed information about the complete library list"
    statement: |
      SELECT *
        FROM qsys2.library_list_info
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "security"
      category: "library-list"

  analyze_library_list_security:
    source: ibmi-system
    description: "Analyze the security configuration of all libraries in the library list"
    statement: |
      SELECT libl.*, priv.*
        FROM qsys2.library_list_info libl, LATERAL (
               SELECT *
                 FROM TABLE (
                     qsys2.object_privileges(
                       system_object_schema => 'QSYS',
                       system_object_name   => system_schema_name, 
                       object_type          => '*LIB')
                   )
             ) priv
        WHERE priv.authorization_user = '*PUBLIC'
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "security"
      category: "library-list-security"

  find_vulnerable_libraries:
    source: ibmi-system
    description: "Identify libraries in the library list with *PUBLIC authority not set to *USE (potential security risk)"
    statement: |
      SELECT libl.system_schema_name AS lib_name, priv.authorization_user AS user_name,
             priv.object_authority
        FROM qsys2.library_list_info libl, LATERAL (
               SELECT *
                 FROM TABLE (
                     qsys2.object_privileges(
                       system_object_schema => 'QSYS', system_object_name => system_schema_name,
                       object_type => '*LIB')
                   )
             ) priv
        WHERE priv.authorization_user = '*PUBLIC' AND 
              priv.object_authority   <> '*USE'   AND
              libl.system_schema_name not in ('QTEMP')
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "security"
      category: "library-list-security"

  check_library_security:
    source: ibmi-system
    description: "Check the security configuration of a specific library"
    statement: |
      SELECT priv.*
        FROM TABLE (
            qsys2.object_privileges(
              system_object_schema => 'QSYS', 
              system_object_name => :library_name,
              object_type => '*LIB')
          ) priv
        WHERE priv.authorization_user = '*PUBLIC'
    parameters:
      - name: library_name
        type: string
        description: "Name of the library to check"
        required: true
    security:
      readOnly: true
    annotations:
      readOnlyHint: true
      idempotentHint: true
      domain: "security"
      category: "library-list-security"

  # === from object-statistics-dev.yaml ===
  # 1. Find least recently used objects
  find_least_recently_used_objects:
    source: ibmi-system
    responseFormat: markdown
    description: Find Db2 for i objects that have been in existence for a specified time period but have never been used or are the least recently used, ordered by least recently ascending
    statement: |
      SELECT objname, objtype, DATE(last_used_timestamp) AS last_used,
       TIMESTAMP(objcreated, 0) AS created, objsize, days_used_count, objlongschema, text,
       sql_object_type
      FROM TABLE(qsys2.object_statistics(
        object_schema => :library_name, objtypelist => '*ALL', object_name => '*ALL'))
      WHERE last_used_object = 'YES' AND (sql_object_type = 'TABLE' OR objattribute IN ('PF', 'LF')) AND
        objcreated < current_timestamp - :months_unused MONTHS AND (last_used_timestamp IS null OR
          last_used_timestamp < current_timestamp - :months_unused MONTHS)
      ORDER BY COALESCE(last_used_timestamp, objcreated) ASC
    parameters:
      - name: library_name
        type: string
        description: "Library name. Examples: 'MYLIB', '*LIBL', '*USRLIBL', '*ALLUSR'"
        required: true
      - name: sql_object_type
        type: string
        description: "SQL object type to find."
        required: false
        default: "INDEX"
        enum: [ALIAS, FUNCTION, INDEX, PACKAGE, PROCEDURE, ROUTINE, SEQUENCE, TABLE, TRIGGER, TYPE, VARIABLE, VIEW, XSR]
      - name: months_unused
        type: integer
        description: "Look back this many months. Examples: 1 (past month), 3 (past 3 months), 6 (past 6 months)"
        required: false
        default: 1
        min: 1
        max: 120

  # 2. Find stale/unused objects
  find_stale_objects:
    source: ibmi-system
    responseFormat: markdown
    description: Find objects that have NOT been used in a specified time period
    statement: |
      SELECT * FROM TABLE (
        qsys2.object_statistics(
          object_schema => :object_schema, objtypelist => '*ALL', object_name => '*ALL')
      ) WHERE last_used_object = 'YES' AND (sql_object_type = 'TABLE' OR objattribute IN ('PF', 'LF')) AND
          last_used_timestamp < current_timestamp - :months_unused MONTHS
      ORDER BY COALESCE(last_used_timestamp, objcreated) ASC
    parameters:
      - name: object_schema
        type: string
        description: "Library name. Examples: 'MYLIB', '*LIBL', '*USRLIBL', '*ALLUSR'"
        required: true
      - name: sql_object_type
        type: string
        description: "SQL object type to find. Examples: 'INDEX', 'TABLE', 'VIEW'"
        required: false
        default: "INDEX"
        enum: [ALIAS, FUNCTION, INDEX, PACKAGE, PROCEDURE, ROUTINE, SEQUENCE, TABLE, TRIGGER, TYPE, VARIABLE, VIEW, XSR]
      - name: months_unused
        type: integer
        description: "Find objects not used in this many months. Examples: 1 (1 month), 6 (6 months), 12 (1 year)"
        required: false
        default: 12
        min: 1
        max: 120

  # 3. Find objects that depend on a file
  find_dependent_objects:
    source: ibmi-system
    responseFormat: markdown
    description: Find all objects that depend on a specific database file (views, triggers, indexes, logical files, etc.)
    statement: |
      SELECT * FROM TABLE(SYSTOOLS.RELATED_OBJECTS(
        LIBRARY_NAME => :library_name,
        FILE_NAME => :file_name))
      ORDER BY SQL_OBJECT_TYPE, SQL_NAME
    parameters:
      - name: library_name
        type: string
        description: "Library containing the file. Example: 'APPLIB', 'MYLIB'"
        required: true
      - name: file_name
        type: string
        description: "System name of the database file to analyze. Example: 'ORDERS', 'CUSTOMER'"
        required: true

  # 4. Find specific types of dependent objects
  find_dependent_objects_by_type:
    source: ibmi-system
    responseFormat: markdown
    description: Find specific types of objects that depend on a file (e.g., only indexes, only views, only triggers)
    statement: |
      SELECT * FROM TABLE(SYSTOOLS.RELATED_OBJECTS(
        LIBRARY_NAME => :library_name,
        FILE_NAME => :file_name))
      WHERE SQL_OBJECT_TYPE = :object_type
      ORDER BY SQL_NAME
    parameters:
      - name: library_name
        type: string
        description: "Library containing the file"
        required: true
      - name: file_name
        type: string
        description: "System name of the database file"
        required: true
      - name: object_type
        type: string
        description: "Type of dependent object to find. Common types: INDEX, VIEW, TRIGGER, LOGICAL FILE"
        required: false
        default: "INDEX"
        enum: ["ALIAS", "FOREIGN KEY", "FUNCTION", "HISTORY TABLE", "INDEX", "KEYED LOGICAL FILE", "LOGICAL FILE", "MASK", "MATERIALIZED QUERY TABLE", "PERMISSION", "PROCEDURE", "TEXT INDEX", "TRIGGER", "VARIABLE", "VIEW", "XML SCHEMA"]

  # === from performance.yaml ===
  system_status:
    source: ibmi-system
    description: "Overall system performance statistics with CPU, memory, and I/O metrics"
    parameters: []
    statement: |
      SELECT * FROM TABLE(QSYS2.SYSTEM_STATUS(RESET_STATISTICS=>'YES',DETAILED_INFO=>'ALL')) X

  system_activity:
    source: ibmi-system
    description: "Current system activity information including active jobs and resource utilization"
    parameters: []
    statement: |
      SELECT * FROM TABLE(QSYS2.SYSTEM_ACTIVITY_INFO())

  remote_connections:
    source: ibmi-system
    description: "Number of established remote connections to the system"
    parameters: []
    statement: |
      SELECT COUNT(REMOTE_ADDRESS) as REMOTE_CONNECTIONS 
      FROM qsys2.netstat_info 
      WHERE TCP_STATE = 'ESTABLISHED' 
      AND REMOTE_ADDRESS != '::1' 
      AND REMOTE_ADDRESS != '127.0.0.1'

  memory_pools:
    source: ibmi-system
    description: "Information about memory pool sizes and thread utilization"
    parameters: []
    statement: |
      SELECT POOL_NAME, CURRENT_SIZE, DEFINED_SIZE, 
             MAXIMUM_ACTIVE_THREADS, CURRENT_THREADS, RESERVED_SIZE 
      FROM TABLE(QSYS2.MEMORY_POOL(RESET_STATISTICS=>'YES')) X

  temp_storage_buckets:
    source: ibmi-system
    description: "Information about named temporary storage usage"
    parameters: []
    statement: |
      SELECT REPLACE(UPPER(REPLACE(GLOBAL_BUCKET_NAME, '*','')), ' ', '_') as NAME, 
             BUCKET_CURRENT_SIZE as CURRENT_SIZE, BUCKET_PEAK_SIZE as PEAK_SIZE 
      FROM QSYS2.SystmpSTG 
      WHERE GLOBAL_BUCKET_NAME IS NOT NULL

  unnamed_temp_storage:
    source: ibmi-system
    description: "Total usage of unnamed temporary storage buckets"
    parameters: []
    statement: |
      SELECT SUM(BUCKET_CURRENT_SIZE) as CURRENT_SIZE, 
             SUM(BUCKET_PEAK_SIZE) as PEAK_SIZE 
      FROM QSYS2.SystmpSTG 
      WHERE GLOBAL_BUCKET_NAME IS NULL

  http_server:
    source: ibmi-system
    description: "Performance metrics for HTTP servers including connections and request handling"
    parameters: []
    statement: |
      SELECT SERVER_NAME CONCAT '_' CONCAT REPLACE(HTTP_FUNCTION, ' ','_') as SERVER_FUNC, 
             SERVER_NORMAL_CONNECTIONS, SERVER_SSL_CONNECTIONS, SERVER_ACTIVE_THREADS, 
             SERVER_IDLE_THREADS, SERVER_TOTAL_REQUESTS, SERVER_TOTAL_REQUESTS_REJECTED, 
             SERVER_TOTAL_RESPONSES, REQUESTS, RESPONSES, NONCACHE_RESPONSES, 
             BYTES_RECEIVED, BYTES_SENT, NONCACHE_PROCESSING_TIME, CACHE_PROCESSING_TIME 
      FROM QSYS2.HTTP_SERVER_INFO

  system_values:
    source: ibmi-system
    description: "Current numeric system values that affect performance"
    parameters: []
    statement: |
      SELECT system_value_name, system_value, text_description
        FROM qsys2.system_value_info
      WHERE system_value_name IN ('QMCHPOOL',
        'QBASPOOL', 'QMAXACTLVL', 'QPFRADJ', 'QACTJOB', 'QADLACTJ', 'QMAXJOB', 'QMAXSPLF',
        'QDBFSTCCOL', 'QDBRCVYWT', 'QSRVDMP', 'QPRCFEAT', 'QTHDRSCAFN', 'QTHDRSCADJ', 'QQRYDEGREE',
        'QRYTIMLMT', 'QTSEPOOL', 'QPRCMLTTSK', 'QMLTTHDACN')
      order by system_value_name

  collection_services:
    source: ibmi-system
    description: "Current configuration of Collection Services"
    parameters: []
    statement: |
      SELECT * FROM QSYS2.COLLECTION_SERVICES_INFO

  collection_categories:
    source: ibmi-system
    description: "Collection Services category settings and intervals"
    parameters: []
    statement: |
      SELECT cs_category, cs_interval
      FROM QSYS2.COLLECTION_SERVICES_INFO, 
           LATERAL (SELECT * FROM JSON_TABLE(CATEGORY_LIST, 'lax $.category_list[*]' 
           COLUMNS(cs_category CLOB(1K) CCSID 1208 PATH 'lax $."category"', 
                   cs_interval CLOB(1K) CCSID 1208 PATH 'lax $."interval"'))) a

  active_job_info:
    source: ibmi-system
    description: "Find the top 10 consumers of CPU in the QUSRWRK and QSYSWRK subsystems"
    parameters:
      - name: limit
        type: integer
        default: 10
        description: "Number of top CPU consumers to return"
    statement: |
      SELECT CPU_TIME, A.* FROM 
      TABLE(QSYS2.ACTIVE_JOB_INFO(SUBSYSTEM_LIST_FILTER => 'QUSRWRK,QSYSWRK')) A 
      ORDER BY CPU_TIME DESC 
      FETCH FIRST :limit ROWS ONLY

